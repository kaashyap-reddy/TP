# CI for the Trainee Portal monorepo (app lives in "TP WebPage/").
# No database is needed anywhere here: backend tests mock Prisma, frontend unit
# tests exercise the pure demo layer, and the Playwright suite drives Demo Mode.
name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: TP WebPage

jobs:
  backend:
    name: Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: TP WebPage/backend/package-lock.json
      - run: npm ci
        working-directory: TP WebPage/backend
      - run: npx prisma validate && npx prisma generate
        working-directory: TP WebPage/backend
      - run: npm run lint
        working-directory: TP WebPage/backend
      - run: npx tsc --noEmit -p .
        working-directory: TP WebPage/backend
      - run: npm test
        working-directory: TP WebPage/backend
      - run: npm run build
        working-directory: TP WebPage/backend

  frontend:
    name: Frontend (lint, typecheck, unit tests, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: TP WebPage/frontend/package-lock.json
      - run: npm ci
        working-directory: TP WebPage/frontend
      - run: npm run lint
        working-directory: TP WebPage/frontend
      - run: npm test
        working-directory: TP WebPage/frontend
      - run: npm run build # tsc -b && vite build — the typecheck lives here
        working-directory: TP WebPage/frontend

  e2e:
    name: E2E (Playwright, Demo Mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: TP WebPage/frontend/package-lock.json
      - run: npm ci
        working-directory: TP WebPage/frontend
      - run: npx playwright install chromium --with-deps
        working-directory: TP WebPage/frontend
      - run: npx playwright test
        working-directory: TP WebPage/frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: TP WebPage/frontend/playwright-report/
          retention-days: 7
